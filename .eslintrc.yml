parserOptions:
  ecmaVersion: "latest"
  sourceType: module
  ecmaFeatures:
    jsx: true
root: true
plugins:
  - react
  - import
  - react-hooks
extends:
  - eslint:recommended
  - plugin:react/recommended
  - plugin:import/errors
  - plugin:import/warnings
  - plugin:react-hooks/recommended
  - next/core-web-vitals
rules:
  import/no-unresolved: "off"
  no-unused-vars: "warn"
  react/jsx-uses-react: "off"
  react/jsx-uses-vars: "error"
  react/react-in-jsx-scope: "off"
  react/prop-types: "off" # Disable prop-types rule for this codebase
  import/no-named-as-default-member: "off" # Disable React named import, specific warning for shadcn components
  react/no-unescaped-entities: "off" # Disable rule for unescaped entities like ', ", <, >, etc.
settings:
  react:
    version: "detect"
  import/resolver:
    node:
      extensions: [".js", ".jsx"]
env:
  node: true
  browser: true
  es2021: true
  jest: true
